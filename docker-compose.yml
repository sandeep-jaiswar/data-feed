# Docker Compose configuration for NSE Data ETL
# Includes ClickHouse, Redis, Prometheus, and Grafana for complete development environment

version: '3.8'

services:
  # Main application
  nse-etl:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-0.1.0}
    container_name: nse-etl-app
    environment:
      - APP_ENV=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - CLICKHOUSE_HOST=clickhouse
      - REDIS_HOST=redis
      - PROMETHEUS_HOST=prometheus
      - SECRET_KEY=${SECRET_KEY:-development-secret-key-change-in-production}
    ports:
      - "8080:8080"  # Application API
      - "8000:8000"  # Metrics endpoint
    volumes:
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - clickhouse
      - redis
      - prometheus
    networks:
      - nse-etl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ClickHouse database for analytical queries
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: nse-etl-clickhouse
    environment:
      - CLICKHOUSE_DB=nse_data
      - CLICKHOUSE_USER=nse_user
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-nse_password}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./docker/clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - nse-etl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis for caching and real-time data
  redis:
    image: redis:7.2-alpine
    container_name: nse-etl-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - nse-etl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: nse-etl-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
    networks:
      - nse-etl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:10.1.2
    container_name: nse-etl-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - nse-etl-network
    restart: unless-stopped
    depends_on:
      - prometheus
      - clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx reverse proxy (optional, for production-like setup)
  nginx:
    image: nginx:1.25-alpine
    container_name: nse-etl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - nse-etl
      - grafana
    networks:
      - nse-etl-network
    restart: unless-stopped
    profiles:
      - production

# Named volumes for data persistence
volumes:
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Custom network for service communication
networks:
  nse-etl-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16