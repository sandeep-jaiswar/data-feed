# Development environment configuration
# This file contains development-specific settings

app:
  name: "NSE Data ETL - Development"
  version: "0.1.0"
  environment: "development"
  debug: true

# API Configuration
api:
  host: "0.0.0.0"
  port: 8080
  workers: 1
  reload: true

# Logging Configuration
logging:
  level: "DEBUG"
  format: "text"  # Human-readable for development
  file: null  # Log to console only in development

# Database Configuration
database:
  clickhouse:
    host: "localhost"
    port: 9000
    database: "nse_data_dev"
    user: "nse_user"
    # Password should be set via environment variable CLICKHOUSE_PASSWORD
    
  redis:
    host: "localhost"
    port: 6379
    db: 0
    # Password should be set via environment variable REDIS_PASSWORD

# Monitoring Configuration
monitoring:
  prometheus:
    host: "localhost"
    port: 9090
  metrics_port: 8000
  health_check_interval: 30
  # Alert webhook URL should be set via environment variable

# Data Collection Configuration
collector:
  nse:
    base_url: "https://www.nseindia.com"
    timeout: 30
    rate_limit: 100  # requests per minute
    
  websocket:
    # WebSocket URL should be set via environment variable
    reconnect_interval: 5
    
  intervals:
    equity_data: 1      # seconds
    derivatives_data: 1 # seconds  
    indices_data: 5     # seconds

# Performance Configuration
performance:
  max_workers: 2        # Lower for development
  batch_size: 100       # Smaller batches for development
  queue_size: 1000      # Smaller queue for development

# Security Configuration (development only)
security:
  allowed_hosts:
    - "*"
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"

# Feature Flags
features:
  enable_websocket: true
  enable_technical_indicators: true
  enable_real_time_processing: true
  enable_data_validation: true
  enable_performance_monitoring: true